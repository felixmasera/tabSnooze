<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabSnooze — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="wrap">
    <header class="page-header">
      <span class="logo-icon">💤</span>
      <span class="logo-text">TabSnooze</span>
      <span class="page-title" data-i18n="settingsTitle">Settings</span>
    </header>

    <section class="card">
      <label class="field-label" data-i18n="langLabel">Language</label>
      <select id="sel-lang" class="select">
        <option value="auto" data-i18n="autoDetect">Auto (browser default)</option>
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="pt">Português</option>
      </select>
    </section>

    <section class="card">
      <div class="section-title" data-i18n="todayTimeLabel">Today — reminder time</div>
      <input type="time" id="inp-today-time" class="time-input" value="18:00" />
    </section>

    <section class="card">
      <div class="section-title" data-i18n="weekSettingsLabel">This week — reminder</div>
      <div class="row">
        <div class="field">
          <label class="field-label" data-i18n="weekDayLabel">Day</label>
          <select id="sel-week-day" class="select"></select>
        </div>
        <div class="field">
          <label class="field-label" data-i18n="weekTimeLabel">Time</label>
          <input type="time" id="inp-week-time" class="time-input" value="09:00" />
        </div>
      </div>
    </section>

    <section class="card">
      <label class="field-label" data-i18n="undoSecsLabel">Undo countdown (seconds)</label>
      <select id="sel-undo-secs" class="select">
        <option value="3">3s</option>
        <option value="5">5s</option>
        <option value="8">8s</option>
        <option value="10">10s</option>
        <option value="15">15s</option>
        <option value="20">20s</option>
        <option value="30">30s</option>
      </select>
    </section>

    <section class="card">
      <div class="section-title" data-i18n="dailyTimeLabel">Daily routine — time</div>
      <input type="time" id="inp-daily-time" class="time-input" value="08:00" />
    </section>

    <div class="actions">
      <button id="btn-save" class="btn-save" data-i18n="saveBtn">Save settings</button>
      <span id="saved-msg" class="saved-msg hidden" data-i18n="savedMsg">Saved ✓</span>
    </div>

    <section class="card card-test">
      <div class="section-title" data-i18n="testAlarmLabel">Test alarm</div>
      <p class="test-desc" data-i18n="testAlarmDesc">Fires a notification in 10 seconds to verify everything works.</p>
      <button id="btn-test-alarm" class="btn-test" data-i18n="testAlarmBtn">Test alarm (10 sec)</button>
    </section>
  </div>

  <script src="../shared/settings.js"></script>
  <script src="../shared/i18n.js"></script>
  <script src="options.js"></script>
</body>
</html>
