<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 1400px; height: 560px; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(1300px 600px at 78% 25%, #241a45 0%, #16122b 50%, #0d0d18 100%);
      color: #f8f8f2;
      display: flex; align-items: center;
      box-sizing: border-box;
    }
    .copy { padding-left: 90px; width: 760px; box-sizing: border-box; }
    .logo-row { display: flex; align-items: center; gap: 16px; margin-bottom: 26px; }
    .logo-row .ico { font-size: 44px; }
    .logo-row .name { font-size: 34px; font-weight: 700; }
    .logo-row .name .accent { color: #bd93f9; }
    h1 { font-size: 58px; font-weight: 800; line-height: 1.1; margin: 0 0 18px; letter-spacing: -1px; }
    h1 .hl { color: #bd93f9; }
    p { font-size: 23px; line-height: 1.5; color: rgba(248,248,242,0.75); margin: 0; }
    .chips { margin-top: 28px; display: flex; gap: 14px; }
    .chip {
      font-size: 18px; padding: 10px 20px; border-radius: 999px;
      border: 1px solid rgba(189,147,249,0.4); background: rgba(189,147,249,0.08);
    }
    .phone {
      margin-left: auto; margin-right: 90px;
      width: 326px; border-radius: 18px;
      border: 1px solid rgba(189,147,249,0.45); background: #0d0d18;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 60px rgba(189,147,249,0.12);
      overflow: hidden;
    }
    .phone .bar {
      height: 28px; background: #1a1a2e; display: flex; align-items: center; gap: 7px;
      padding-left: 14px; border-bottom: 1px solid rgba(189,147,249,0.2);
    }
    .phone .bar i { width: 10px; height: 10px; border-radius: 50%; display: block; }
    .phone .clip { width: 300px; height: 470px; overflow: hidden; margin: 0 12px; }
    .phone .clip iframe {
      display: block; width: 360px; height: 910px; border: 0;
      transform: scale(0.82); transform-origin: top left; background: transparent;
    }
  </style>
</head>
<body>
  <div class="copy">
    <div class="logo-row"><span class="ico">💤</span><span class="name">Tab<span class="accent">Snooze</span></span></div>
    <h1>Snooze tabs.<br /><span class="hl">Stay focused.</span></h1>
    <p>Send tabs away and get them back exactly when you need them.</p>
    <div class="chips">
      <span class="chip">☀️ Today</span>
      <span class="chip">📅 This week</span>
      <span class="chip">🌙 Someday</span>
      <span class="chip">🔁 Daily</span>
    </div>
  </div>
  <div class="phone">
    <div class="bar">
      <i style="background:#ff5555"></i><i style="background:#ffb86c"></i><i style="background:#50fa7b"></i>
    </div>
    <div class="clip"><iframe src="popup-demo.html"></iframe></div>
  </div>
</body>
</html>
