<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 440px; height: 280px; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(420px 300px at 70% 15%, #241a45 0%, #16122b 55%, #0d0d18 100%);
      color: #f8f8f2;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .logo { font-size: 44px; margin-bottom: 10px; }
    h1 { font-size: 34px; font-weight: 800; margin: 0 0 8px; letter-spacing: -0.5px; }
    h1 .accent { color: #bd93f9; }
    p { font-size: 16px; margin: 0; color: rgba(248,248,242,0.75); }
  </style>
</head>
<body>
  <div class="logo">💤</div>
  <h1>Tab<span class="accent">Snooze</span></h1>
  <p>Snooze tabs. Stay focused.</p>
</body>
</html>
